<title>لعبة ناصر</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;overscroll-behavior:none}
  canvas{display:block;touch-action:none}
  #hud{position:fixed;inset:0;pointer-events:none}
  #hud .ctl{pointer-events:auto;touch-action:none}

  #camBtns{position:absolute;top:14px;left:14px;display:flex;gap:10px;flex-wrap:wrap;width:132px}
  .camBtn{width:56px;height:56px;border-radius:50%;background:rgba(15,15,18,.75);border:2px solid #e8e8e8;
    color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
  .camBtn b{font-size:16px;line-height:1}
  .camBtn span{font-size:9px;letter-spacing:0;margin-top:2px}
  .camBtn.active{background:#2d6cdf;border-color:#fff}
  .camBtn.off{opacity:.4}

  #stick{position:fixed;width:140px;height:140px;margin:-70px 0 0 -70px;border-radius:50%;
    background:rgba(18,20,28,.35);border:2px solid rgba(255,255,255,.3);
    display:none;pointer-events:none;z-index:2}
  #knob{position:absolute;left:50%;top:50%;width:58px;height:58px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#5a6070,#23262e);border:2px solid rgba(255,255,255,.45);
    transform:translate(-50%,-50%);box-shadow:0 4px 12px rgba(0,0,0,.55)}

  #speedBox{position:absolute;left:16px;bottom:18px;display:flex;flex-direction:column;align-items:flex-start;gap:6px}
  #bars{display:flex;flex-direction:column-reverse;gap:3px}
  .bar{width:30px;height:8px;border-radius:2px;background:rgba(10,25,10,.55)}
  .bar.on{background:#39e14e;box-shadow:0 0 7px #39e14e}
  #bars.boost .bar.on{background:#ff8a2a;box-shadow:0 0 8px #ff8a2a}
  #mph{font:700 14px system-ui;color:#fff;background:rgba(0,0,0,.55);padding:3px 8px;border-radius:7px}

  #hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
    font:11px system-ui;color:rgba(255,255,255,.75);background:rgba(0,0,0,.35);padding:3px 10px;border-radius:8px}

  #boostBtn{position:absolute;right:196px;bottom:36px;width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#6b1a1a,#2c0b0b);border:2px solid #77302a;
    display:flex;align-items:center;justify-content:center;font-size:26px;opacity:.45}
  #boostBtn.ready{opacity:1;border-color:#ff8a2a;box-shadow:0 0 16px rgba(255,130,40,.75);cursor:pointer}
  #boostCount{position:absolute;top:-5px;right:-3px;background:#ff8a2a;color:#1a0d00;
    font:800 12px/1 system-ui;padding:3px 7px;border-radius:10px}

  #raceHud{position:absolute;top:12px;left:50%;transform:translateX(-50%);text-align:center}
  #pos{font:800 20px/1 system-ui;color:#fff;background:rgba(0,0,0,.55);padding:6px 14px;border-radius:10px;display:inline-block}
  #dist,#lvl{font:700 12px system-ui;color:#fff;background:rgba(0,0,0,.45);padding:2px 8px;border-radius:7px;margin-top:5px;display:inline-block}
  #lvl{color:#ffd23f}
  #banner{position:absolute;top:26%;left:50%;transform:translate(-50%,-50%);font:900 clamp(44px,11vw,90px)/1.15 system-ui;
    color:#ffd23f;text-shadow:0 5px 14px rgba(0,0,0,.65);display:none;pointer-events:none;white-space:nowrap}
  #result{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;background:rgba(0,0,0,.5)}
  #result h1{margin:0;font:800 38px system-ui;color:#ffd23f;text-shadow:0 3px 8px rgba(0,0,0,.6)}
  #result button{font:800 18px system-ui;padding:12px 34px;border-radius:12px;border:none;background:#2d6cdf;color:#fff;cursor:pointer}
  #menuBtn2{background:#4a4a52 !important;font-size:15px !important;padding:10px 26px !important}

  #menu{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:24px 12px 18px;color:#fff;
    background:linear-gradient(180deg, rgba(8,10,18,.93) 0%, rgba(8,10,18,.62) 20%, rgba(8,10,18,0) 38%,
      rgba(8,10,18,0) 64%, rgba(8,10,18,.72) 79%, rgba(8,10,18,.95) 100%)}
  #menuTop,#menuBottom{display:flex;flex-direction:column;align-items:center;gap:12px}
  #menu h1{margin:0 0 6px;font:900 46px system-ui;color:#ffd23f;letter-spacing:3px;text-shadow:0 4px 14px rgba(0,0,0,.7)}
  #menu .big{font:800 17px system-ui;padding:14px 32px;border-radius:14px;border:none;background:#2d6cdf;color:#fff;cursor:pointer;
    box-shadow:0 6px 18px rgba(45,108,223,.4)}
  #menu .sep{font:700 12px system-ui;color:rgba(255,255,255,.55);letter-spacing:3px;margin-top:12px}
  #maps{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:540px;padding:0 16px}
  #maps button{font:700 13px system-ui;padding:11px 15px;border-radius:10px;border:2px solid rgba(255,255,255,.3);cursor:pointer}
  .btnRow{display:flex;gap:10px;margin-top:10px}
  #sndBtn,#musicBtn{font:700 12px system-ui;background:none;border:1px solid rgba(255,255,255,.35);color:#fff;
    padding:8px 16px;border-radius:9px;cursor:pointer}
  #lens{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  #lens button{font:700 12px system-ui;padding:8px 14px;border-radius:9px;border:2px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.08);color:#fff;cursor:pointer}
  #lens button.sel{border-color:#ffd23f;color:#ffd23f}
  #colors{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:420px}
  #colors button{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.25);cursor:pointer}
  #colors button.sel{border-color:#ffd23f;box-shadow:0 0 12px rgba(255,210,63,.7)}
  #buildTag{font:600 10px system-ui;color:rgba(255,255,255,.45);margin-top:4px}
  .confetti{position:absolute;top:-20px;width:10px;height:14px;pointer-events:none;animation:fall 3s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}

  /* notched phones: keep controls inside the safe area */
  @supports (padding: env(safe-area-inset-top)){
    #camBtns{top:calc(14px + env(safe-area-inset-top));left:calc(14px + env(safe-area-inset-left))}
    #speedBox{bottom:calc(18px + env(safe-area-inset-bottom));left:calc(16px + env(safe-area-inset-left))}
    #boostBtn{bottom:calc(36px + env(safe-area-inset-bottom))}
    #hint{bottom:calc(6px + env(safe-area-inset-bottom))}
    #menu{padding:calc(24px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom))}
  }
  /* small screens: compact controls, scrollable menu */
  @media (max-width: 480px), (max-height: 520px){
    .camBtn{width:46px;height:46px}
    .camBtn b{font-size:13px}
    .camBtn span{font-size:8px}
    #camBtns{width:114px;gap:8px}
    #knob{width:50px;height:50px}
    #boostBtn{width:54px;height:54px;font-size:21px;right:148px;bottom:26px}
    .bar{width:22px;height:6px}
    #mph{font-size:12px}
    #pos{font-size:16px}
    #menu{overflow-y:auto;justify-content:flex-start;gap:14px}
    #menu h1{font-size:32px;margin:0}
    #menu .big{font-size:14px;padding:11px 20px}
    #maps button{font-size:11px;padding:8px 10px}
    #lens button{font-size:11px;padding:7px 10px}
    #colors button{width:29px;height:29px}
    #result h1{font-size:24px;padding:0 14px;text-align:center}
    #hint{display:none}
  }
</style>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const TILE = 300;          // scenery repeats every TILE metres
const MAX = 38;            // m/s top speed (~85 mph)
const clamp = THREE.MathUtils.clamp;

// ---------- five challenges, one map each; win to advance ----------
const THEMES = [
  {name: 'المدينة',      sky: 0x8ecbee, ground: 0x6faa54, sunCol: 0xfff4e0, sunInt: 2.0, hemiInt: 1.1, scen: 'city'},
  {name: 'الصحراء',      sky: 0xf2c98a, ground: 0xd9b36c, sunCol: 0xffdca0, sunInt: 2.3, hemiInt: 1.0, scen: 'desert'},
  {name: 'الثلج',        sky: 0xd7e4f0, ground: 0xeef3f7, sunCol: 0xeaf2ff, sunInt: 1.7, hemiInt: 1.2, scen: 'snow'},
  {name: 'ساحل الغروب',  sky: 0xff9e6d, ground: 0xc8a06a, sunCol: 0xff9a4d, sunInt: 1.8, hemiInt: 0.85, scen: 'coast'},
  {name: 'مدينة الليل',  sky: 0x0d1330, ground: 0x22301f, sunCol: 0x8899ff, sunInt: 0.6, hemiInt: 0.5, scen: 'night'},
];
let raceCfg = null;
try { raceCfg = JSON.parse(sessionStorage.raceCfg || 'null'); } catch {}
let lvlStored = 1;
try { lvlStored = parseInt(localStorage.carLevel) || 1; } catch {}
const campaignLevel = Math.min(THEMES.length, Math.max(1, lvlStored));
const FREE = !!(raceCfg && raceCfg.mode === 'free');
const LEVEL = FREE ? Math.min(THEMES.length, Math.max(1, raceCfg.lvl)) : campaignLevel;
const THEME = THEMES[LEVEL - 1];
let menuOpen = !raceCfg;                   // fresh visit -> main menu; restarts skip straight to the grid

// ---------- sound: all synthesized, no audio files ----------
let AC = null, engineSrc = null, engineFilter = null, engineGain = null;
let muted = false, musicOff = false;
try { muted = localStorage.muted === '1'; musicOff = localStorage.musicOff === '1'; } catch {}
function initAudio(){
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    // engine = F1-style scream: a saw-rich harmonic stack over a high firing frequency,
    // plus periodic pseudo-noise rasp AM'd by the firing cycle. Every component is an
    // integer-Hz sine, so the 1-second buffer loops with no seam click. Revved by playbackRate.
    const sr = AC.sampleRate;
    const len = sr;                                      // exactly 1 s — integer-Hz sines loop clean
    const buf = AC.createBuffer(1, len, sr);
    const d = buf.getChannelData(0);
    const F0 = 100;                                      // firing fundamental at playbackRate 1
    const ph = Array.from({length: 21}, () => Math.random()*2*Math.PI);
    const rasp = Array.from({length: 40}, () => [700 + Math.floor(Math.random()*3300), Math.random()*2*Math.PI]);
    for (let i = 0; i < len; i++){
      const t = i/sr;
      let v = 0.22*Math.sin(2*Math.PI*50*t);             // a little body under the scream
      for (let h = 1; h <= 20; h++) v += Math.sin(2*Math.PI*F0*h*t + ph[h])/Math.pow(h, 0.85);
      let n = 0;
      for (const [f, p] of rasp) n += Math.sin(2*Math.PI*f*t + p);
      v += n*0.02*(0.6 + 0.4*Math.sin(2*Math.PI*F0*t)); // rasp breathes with the firing cycle
      d[i] = v;
    }
    let mx = 0;
    for (let i = 0; i < len; i++) mx = Math.max(mx, Math.abs(d[i]));
    for (let i = 0; i < len; i++) d[i] *= 0.9/mx;
    engineSrc = AC.createBufferSource();
    engineSrc.buffer = buf;
    engineSrc.loop = true;
    engineFilter = AC.createBiquadFilter();
    engineFilter.type = 'lowpass';
    engineFilter.frequency.value = 700;
    engineGain = AC.createGain(); engineGain.gain.value = 0;
    engineSrc.connect(engineFilter); engineFilter.connect(engineGain); engineGain.connect(AC.destination);
    engineSrc.start();
    if (muted) AC.suspend();
  } catch {}
}
// background music (songs/ya-marhaba), looped through the context. The music toggle mutes
// its GAIN rather than pausing the element: pausing triggers an iOS audio-session
// interruption that silences the whole context (engine and effects included).
let musicEl = null, musicGain = null;
function startMusic(){
  if (musicEl || !AC) return;
  musicEl = new Audio();
  musicEl.src = musicEl.canPlayType('audio/mp4') ? 'songs/ya-marhaba.m4a' : 'songs/ya-marhaba.ogg';
  musicEl.loop = true;
  try {
    const src = AC.createMediaElementSource(musicEl);
    musicGain = AC.createGain();
    musicGain.gain.value = musicOff ? 0 : 0.32;
    src.connect(musicGain); musicGain.connect(AC.destination);
  } catch {}
  musicEl.play().catch(() => { musicEl = null; musicGain = null; });   // blocked -> retry next gesture
}
// every real gesture retries the unlock: browsers park contexts in 'suspended' AND
// (iOS) 'interrupted' states — resume from anything that isn't running
const audioKick = () => {
  initAudio();
  if (AC && !muted && AC.state !== 'running') AC.resume();
  startMusic();
};
addEventListener('pointerdown', audioKick);
addEventListener('keydown', audioKick);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && AC && !muted && AC.state !== 'running') AC.resume();
});
function beep(freq, dur, type = 'square', vol = 0.15, when = 0){
  if (!AC || muted) return;
  const t0 = AC.currentTime + when;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
function whoosh(){
  if (!AC || muted) return;
  const b = AC.createBuffer(1, AC.sampleRate*0.7, AC.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2 - 1)*(1 - i/d.length);
  const s = AC.createBufferSource(); s.buffer = b;
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 700; f.Q.value = 0.6;
  const g = AC.createGain(); g.gain.value = 0.5;
  s.connect(f); f.connect(g); g.connect(AC.destination);
  s.start();
}
const winJingle = () => [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.2, 'square', 0.16, i*0.13));
const loseJingle = () => [392, 311, 233].forEach((f, i) => beep(f, 0.28, 'sawtooth', 0.13, i*0.2));

// ---------- renderer / scene ----------
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(THEME.sky);
scene.fog = new THREE.Fog(THEME.sky, 60, 230);
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 600);   // longer lens: sprites stay near center, less edge skew

scene.add(new THREE.HemisphereLight(THEME.sky, THEME.ground, THEME.hemiInt));
const sun = new THREE.DirectionalLight(THEME.sunCol, THEME.sunInt);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, {left:-110, right:110, top:110, bottom:-110, near:1, far:280});
sun.shadow.camera.updateProjectionMatrix();
scene.add(sun, sun.target);

// neutral studio reflections so painted/metal surfaces read as 3D, not flat (car paint needs this)
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- textures (canvas-drawn, no assets) ----------
function canvasTex(size, draw){
  const c = document.createElement('canvas'); c.width = c.height = size;
  draw(c.getContext('2d'));
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// road: 256px = 13m wide x 12m long strip (12 divides TILE -> seamless snap)
const PXM = 256/13;
const roadTex = canvasTex(256, g => {
  g.fillStyle = '#57575c'; g.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 500; i++){
    g.fillStyle = Math.random() < .5 ? '#525257' : '#5e5e63';
    g.fillRect(Math.random()*256, Math.random()*256, 2, 2);
  }
  g.fillStyle = '#e6bf1e';                          // double yellow centre
  g.fillRect(123, 0, 4, 256); g.fillRect(130, 0, 4, 256);
  g.fillStyle = '#e9e9e9';                          // dashed lane lines at ±3m
  for (const x of [128 - 3*PXM, 128 + 3*PXM])
    for (let y = 0; y < 256; y += 128) g.fillRect(x-1.5, y, 3, 64);
  g.fillRect(128 - 5.9*PXM, 0, 3, 256);             // solid edge lines
  g.fillRect(128 + 5.9*PXM - 3, 0, 3, 256);
});
roadTex.repeat.set(1, TILE*3/12);
roadTex.anisotropy = renderer.capabilities.getMaxAnisotropy();  // keeps lane markings crisp at grazing angles

const winTex = canvasTex(64, g => {
  g.fillStyle = '#f4f2ee'; g.fillRect(0, 0, 64, 64);
  for (let y = 5; y < 60; y += 16)
    for (let x = 5; x < 60; x += 16){
      g.fillStyle = Math.random() < .22 ? '#ffe9a8' : '#28405f';
      g.fillRect(x, y, 9, 11);
    }
});

// ---------- ground / road (uniform strips, snapped to player) ----------
const grass = new THREE.Mesh(
  new THREE.PlaneGeometry(600, TILE*3),
  new THREE.MeshStandardMaterial({color: THEME.ground}));
grass.rotation.x = -Math.PI/2; grass.position.y = -0.02; grass.receiveShadow = true;
scene.add(grass);

const road = new THREE.Mesh(
  new THREE.PlaneGeometry(13, TILE*3),
  new THREE.MeshStandardMaterial({map:roadTex, roughness:.95}));
road.rotation.x = -Math.PI/2; road.position.y = 0.05; road.receiveShadow = true;
scene.add(road);

const curbMat = new THREE.MeshStandardMaterial({color:0xbdbdb6});
const sidewalks = [-7.5, 7.5].map(x => {
  const s = new THREE.Mesh(new THREE.BoxGeometry(3, 0.18, TILE*3), curbMat);
  s.position.set(x, 0.09, 0); s.receiveShadow = true;
  scene.add(s); return s;
});

// ---------- city tile (buildings + palms), cloned 3x for endless street ----------
const roofMat = new THREE.MeshStandardMaterial({color:0x8a8a88});
const wallMats = [0xd8d3c8, 0xb9c4cc, 0xc9b8a8, 0x9fb3bd, 0xe0ddd4, 0xa8bcae].map(color => {
  const t = winTex.clone(); t.needsUpdate = true;
  t.repeat.set(1.5 + Math.random()*1.5, 3 + Math.random()*3);
  const opts = {color, map: t};

          const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), [mat, mat, roofMat, roofMat, mat, mat]);
          b.position.set(side*(10.5 + w/2 + Math.random()*5), h/2, z + d/2);

        }
        if (scen === 'city' && Math.random() < 0.55) g.add(palm(side*9.7, z + Math.random()*4));

      } else if (scen === 'desert'){

        if (Math.random() < 0.55) g.add(cactus(side*(10.5 + Math.random()*7), z + Math.random()*6));
        if (Math.random() < 0.4) g.add(rock(0x9a7b52, side*(12 + Math.random()*22), z + 5));
        z += 13 + Math.random()*10;
      } else if (scen === 'snow'){
        if (Math.random() < 0.85) g.add(pine(side*(10.5 + Math.random()*12), z));
        if (Math.random() < 0.3) g.add(rock(0xcfd8e2, side*(13 + Math.random()*18), z + 5));
        z += 11 + Math.random()*8;

        if (Math.random() < 0.75) g.add(palm(side*(10 + Math.random()*5), z));
        if (Math.random() < 0.3) g.add(rock(0xb0a08a, side*(15 + Math.random()*20), z + 4));
        if (Math.random() < 0.25) g.add(dune(side*(35 + Math.random()*40), z));

}

// each car clones the template and owns a repaintable copy of the baked texture.
// body panels are the neutral 27..36 grays (41% of pixels); tires/glass/trim live in
// other bands, the ORM metallic channel masks glass, and the windshield island is spared

                  orange: 'البرتقالية', purple: 'البنفسجية', silver: 'الفضية', black: 'السوداء'};
const CAR_LEN = 4.5;                       // metres
const GLB_TINT = {red:0xff2a3a, blue:0x2a72ff, yellow:0xffd21e, green:0x33ff6a,
                  orange:0xff7a1e, purple:0xc24cff, silver:0x8fd8ff, black:0x00d0ff};
const BODY_TINT = {red:[192,40,44], blue:[40,84,208], yellow:[214,172,30], green:[42,158,66],
                   orange:[210,102,26], purple:[132,56,180], silver:[186,190,196], black:[30,30,30]};

// repaint one car's canvas: body panels take the tint, everything else keeps the baked look
function paintBody(cv, name){
  const [tr, tg, tb] = BODY_TINT[name] || BODY_TINT.red;
  const g = cv.getContext('2d');
  g.drawImage(glbBase, 0, 0);
  const W = cv.width, H = cv.height;
  const d = g.getImageData(0, 0, W, H), q = d.data;
  // windshield UV island (located by quadrant-marker probing) — glass must not take paint
  const wx1 = 0.25*W, wy0 = 0.73*H, wy1 = 0.88*H;
  for (let i = 0; i < q.length; i += 4){
    const r = q[i], p = i/4, x = p % W, y = (p - x)/W;
    if (x < wx1 && y >= wy0 && y < wy1) continue;      // windshield stays glass
    if (glbMask && !glbMask[i/4]) continue;            // glass/plastic: not metallic, keep dark
    if (r < 27 || r > 36 || Math.max(r, q[i+1], q[i+2]) - Math.min(r, q[i+1], q[i+2]) > 2) continue;
    const s = r/30;                                    // keep the fill-level shading steps
    q[i] = Math.min(255, tr*s); q[i+1] = Math.min(255, tg*s); q[i+2] = Math.min(255, tb*s);
  }
  g.putImageData(d, 0, 0);
}

// recolour an existing car (or record the tint for when the model arrives)
function tintCar(group, name){
  group.userData.tint = name;
  const p = group.userData.paint;
  if (!p) return;
  paintBody(p.cv, name);
  p.tex.needsUpdate = true;
  p.mat.emissive.setHex(GLB_TINT[name] || 0x00d0ff);
}

// clone the template into `group` with its own material + paint canvas
function dressCar(group, name){
  group.userData.tint = name;
  if (!glbTemplate){ pendingGlb.push(group); return; }
  const car = glbTemplate.clone(true);
  let mesh = null;
  car.traverse(o => { if (o.isMesh) mesh = o; });
  const mat = mesh.material = mesh.material.clone();
  if (glbEmis) mat.emissiveMap = glbEmis;
  if (glbBase){
    const bm = glbTemplate.userData.baseMap;
    const cv = document.createElement('canvas');
    cv.width = glbBase.width; cv.height = glbBase.height;
    const tex = new THREE.CanvasTexture(cv);
    tex.flipY = bm.flipY; tex.colorSpace = bm.colorSpace;
    tex.wrapS = bm.wrapS; tex.wrapT = bm.wrapT;
    mat.map = tex;
    group.userData.paint = {cv, tex, mat};
  }
  group.add(car);
  tintCar(group, group.userData.tint);
}

new GLTFLoader().load('cyberpunk_car.glb', gltf => {
  const car = gltf.scene;
  car.rotation.y = Math.PI;                       // model's nose is -z; flip before measuring
  const size = new THREE.Box3().setFromObject(car).getSize(new THREE.Vector3());
  car.scale.setScalar(CAR_LEN / size.z);          // fit length to a real car
  const box = new THREE.Box3().setFromObject(car), c = box.getCenter(new THREE.Vector3());
  car.position.set(-c.x, -box.min.y, -c.z);       // centre x/z, wheels on the ground
  let mesh = null;
  car.traverse(o => { if (o.isMesh){ o.castShadow = true; o.material.envMapIntensity = 1.3; mesh = o; } });
  const bm = mesh.material.map;
  if (bm && bm.image){
    glbBase = bm.image;
    car.userData.baseMap = bm;
    // body paint is semi-metallic, glass/plastic isn't — the ORM blue channel is a free paint mask
    const om = mesh.material.metalnessMap;
    if (om && om.image){
      const mc = document.createElement('canvas');
      mc.width = glbBase.width; mc.height = glbBase.height;
      const mg = mc.getContext('2d');
      mg.drawImage(om.image, 0, 0, mc.width, mc.height);
      const md = mg.getImageData(0, 0, mc.width, mc.height).data;
      glbMask = new Uint8Array(md.length/4);
      for (let i = 0; i < glbMask.length; i++) glbMask[i] = md[i*4+2] >= 40 ? 1 : 0;
    }
  }
  // desaturate the baked glow map to a mask, so each car's neon colour reads true
  const em = mesh.material.emissiveMap;
  if (em && em.image){
    const im = em.image, cv = document.createElement('canvas');
    cv.width = im.width; cv.height = im.height;
    const g = cv.getContext('2d'); g.drawImage(im, 0, 0);
    const d = g.getImageData(0, 0, cv.width, cv.height), q = d.data;
    for (let i = 0; i < q.length; i += 4) q[i] = q[i+1] = q[i+2] = Math.max(q[i], q[i+1], q[i+2]);
    g.putImageData(d, 0, 0);
    glbEmis = new THREE.CanvasTexture(cv);
    glbEmis.flipY = em.flipY; glbEmis.colorSpace = em.colorSpace;
    glbEmis.wrapS = em.wrapS; glbEmis.wrapT = em.wrapT;
  }
  glbTemplate = car;
  pendingGlb.splice(0).forEach(g => dressCar(g, g.userData.tint));
}, undefined, e => console.error('car load failed', e));

// floating joystick: touch anywhere on the road to spawn it under your finger;
// up = gas, down = brake/reverse, sideways = analog steering. Double-tap fires the boost.
const stickEl = document.getElementById('stick');
const knobEl = document.getElementById('knob');
const STICK_R = 52;
let stickPtr = null, stickOX = 0, stickOY = 0;
let lastTapT = 0, lastTapX = 0, lastTapY = 0;
const gameCanvas = renderer.domElement;
addEventListener('pointerdown', e => {
  if (e.target !== gameCanvas) return;             // buttons and menus keep their own behavior
  const t = performance.now();
  if (t - lastTapT < 300 && Math.hypot(e.clientX - lastTapX, e.clientY - lastTapY) < 80) fireBoost();
  lastTapT = t; lastTapX = e.clientX; lastTapY = e.clientY;
  if (stickPtr !== null) return;                   // first touch owns the stick
  stickPtr = e.pointerId;
  stickOX = e.clientX; stickOY = e.clientY;
  stickEl.style.left = `${stickOX}px`;
  stickEl.style.top = `${stickOY}px`;
  stickEl.style.display = 'block';
  knobEl.style.transform = 'translate(-50%, -50%)';
});
addEventListener('pointermove', e => {
  if (e.pointerId !== stickPtr) return;
  let dx = e.clientX - stickOX, dy = e.clientY - stickOY;
  const d = Math.hypot(dx, dy);
  if (d > STICK_R){ dx *= STICK_R/d; dy *= STICK_R/d; }
  stickX = dx/STICK_R;
  stickY = -dy/STICK_R;
  knobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
});
const stickOff = e => {
  if (e.pointerId !== stickPtr) return;
  stickPtr = null; stickX = 0; stickY = 0;
  stickEl.style.display = 'none';
};
addEventListener('pointerup', stickOff);

addEventListener('contextmenu', e => e.preventDefault());

// ---------- HUD ----------
const barsEl = document.getElementById('bars');
const bars = Array.from({length:10}, () => {
  const b = document.createElement('div'); b.className = 'bar'; barsEl.appendChild(b); return b;
});
const mphEl = document.getElementById('mph');
const bannerEl = document.getElementById('banner');
const posEl = document.getElementById('pos');
const distEl = document.getElementById('dist');
const resultEl = document.getElementById('result');
const resultText = document.getElementById('resultText');
const resultBtn = document.getElementById('restart');
let advance = false;                      // set on a win — the result button then loads the next challenge
resultBtn.addEventListener('click', () => {
  if (advance){ try { localStorage.carLevel = LEVEL < THEMES.length ? LEVEL + 1 : 1; } catch {} }
  location.reload();
});
document.getElementById('lvl').textContent =
  FREE ? `سباق حر · ${THEME.name}` : `التحدي ${LEVEL}/${THEMES.length} · ${THEME.name}`;

// ---------- main menu ----------
const menuEl = document.getElementById('menu');
const lobbyFresh = menuOpen;               // true only on a fresh visit (no race to resume)
const resumeBtn = document.getElementById('resumeBtn');
resumeBtn.style.display = 'none';
function openMenu(){                       // mid-race: menu doubles as a pause, nothing is lost
  menuOpen = true;
  menuEl.style.display = 'flex';
  resumeBtn.style.display = '';
  setLobby(true);
  if (AC && engineGain) engineGain.gain.setTargetAtTime(0.03, AC.currentTime, 0.2);
}
function closeMenu(){
  menuOpen = false;
  menuEl.style.display = 'none';
  setLobby(false);
}
resumeBtn.addEventListener('click', closeMenu);
const toMenu = () => { try { sessionStorage.removeItem('raceCfg'); } catch {} location.reload(); };
document.getElementById('menuBtn').addEventListener('pointerdown', openMenu);
document.getElementById('menuBtn2').addEventListener('click', toMenu);
const campBtn = document.getElementById('playCampaign');
campBtn.textContent = `▶ الحملة — التحدي ${campaignLevel}/${THEMES.length} · ${THEMES[campaignLevel-1].name}`;
campBtn.addEventListener('click', () => {
  try { sessionStorage.raceCfg = JSON.stringify({mode: 'campaign'}); } catch {}
  initAudio();
  if (lobbyFresh) closeMenu();             // scene is already built for the campaign level
  else location.reload();                  // opened mid-race: start the campaign fresh
});
const mapsEl = document.getElementById('maps');
THEMES.forEach((t, i) => {
  const b = document.createElement('button');
  b.textContent = t.name;
  const r = (t.sky >> 16) & 255, g = (t.sky >> 8) & 255, bl = t.sky & 255;
  b.style.background = `#${t.sky.toString(16).padStart(6, '0')}`;
  b.style.color = (r*0.35 + g*0.5 + bl*0.15) > 130 ? '#1c1c22' : '#fff';
  b.addEventListener('click', () => {
    try { sessionStorage.raceCfg = JSON.stringify({mode: 'free', lvl: i + 1}); } catch {}
    initAudio();
    location.reload();
  });
  mapsEl.appendChild(b);
});
// car paint picker: repaints the player live, kicks any rival off the chosen color
function recolorPlayer(name){
  playerColor = name;
  try { localStorage.carColor = name; } catch {}
  tintCar(player, name);
  const used = new Set([name, ...rivals.map(r => r.tint)]);
  for (const r of rivals){
    if (r.tint !== name) continue;
    const free = Object.keys(BODY_TINT).find(c => !used.has(c));
    r.tint = free; r.name = cap(free); used.add(free);
    tintCar(r.mesh, free);
  }
}
// race distance chips: applies immediately in the lobby, next race if changed mid-race
document.getElementById('dist').textContent = `${RACE_LEN} م`;
const lensEl = document.getElementById('lens');
[1000, 1500, 2000, 2500, 3000].forEach(v => {
  const b = document.createElement('button');
  b.textContent = `${v/1000} كم`;
  if (v === RACE_LEN) b.classList.add('sel');
  b.addEventListener('click', () => {
    try { localStorage.raceLen = v; } catch {}
    if (lobbyFresh) location.reload();
    else lensEl.querySelectorAll('button').forEach(x => x.classList.toggle('sel', x === b));
  });
  lensEl.appendChild(b);
});

const colorsEl = document.getElementById('colors');
Object.entries(BODY_TINT).forEach(([name, rgb]) => {
  const b = document.createElement('button');
  b.style.background = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
  b.title = AR_COLOR[name] || name;
  if (name === playerColor) b.classList.add('sel');
  b.addEventListener('click', () => {
    recolorPlayer(name);
    colorsEl.querySelectorAll('button').forEach(x => x.classList.toggle('sel', x === b));
  });
  colorsEl.appendChild(b);
});

const sndBtn = document.getElementById('sndBtn');
const sndLabel = () => sndBtn.textContent = muted ? '\u{1F507} الصوت متوقف' : '\u{1F50A} الصوت يعمل';
sndLabel();
const musicBtn = document.getElementById('musicBtn');
const musicLabel = () => musicBtn.textContent = musicOff ? '\u{1F3B5} الموسيقى متوقفة' : '\u{1F3B5} الموسيقى تعمل';
const sndBtn2 = document.getElementById('sndBtn2');
const musicBtn2 = document.getElementById('musicBtn2');
function syncAudioUI(){
  sndLabel(); musicLabel();
  sndBtn2.classList.toggle('off', muted);
  sndBtn2.querySelector('b').textContent = muted ? '\u{1F507}' : '\u{1F50A}';
  musicBtn2.classList.toggle('off', musicOff);
}
function toggleSound(){
  muted = !muted;
  try { localStorage.muted = muted ? '1' : '0'; } catch {}
  if (!muted) initAudio();
  if (AC) muted ? AC.suspend() : AC.resume();
  syncAudioUI();
}
function toggleMusic(){
  musicOff = !musicOff;
  try { localStorage.musicOff = musicOff ? '1' : '0'; } catch {}
  if (!musicOff && !musicEl){ initAudio(); startMusic(); }
  if (musicGain) musicGain.gain.setTargetAtTime(musicOff ? 0 : 0.32, AC.currentTime, 0.05);
  syncAudioUI();
}
sndBtn.addEventListener('click', toggleSound);
musicBtn.addEventListener('click', toggleMusic);
sndBtn2.addEventListener('pointerdown', toggleSound);
musicBtn2.addEventListener('pointerdown', toggleMusic);
syncAudioUI();
// workshop mode: hide the race HUD and the rivals so your car has the floor
const hudEl = document.getElementById('hud');
function setLobby(on){
  hudEl.style.visibility = on ? 'hidden' : 'visible';
  rivals.forEach(r => r.mesh.visible = !on);
}
if (!menuOpen) menuEl.style.display = 'none';
setLobby(menuOpen);
document.getElementById('restartBtn').addEventListener('pointerdown', () => location.reload());
let paused = false;
const stopBtn = document.getElementById('stopBtn');
stopBtn.addEventListener('pointerdown', () => {
  paused = !paused;
  stopBtn.classList.toggle('active', paused);
});

function confetti(){
  const colors = ['#ffd23f', '#ff5252', '#4dd162', '#42a5f5', '#ab47bc', '#fff'];
  for (let i = 0; i < 90; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDelay = Math.random()*1.2 + 's';
    c.style.animationDuration = 2 + Math.random()*2 + 's';
    document.getElementById('hud').appendChild(c);
    setTimeout(() => c.remove(), 5500);
  }
}

// ---------- main loop ----------
let last = performance.now();
camera.position.set(px, 3.2, pz - 8);

function frame(now){
  requestAnimationFrame(frame);
  const dt = Math.min((now - last)/1000, 0.05);
  last = now;

  if (menuOpen){                    // workshop: slow showcase orbit around your car
    const a = now/2600;
    camera.position.set(px + Math.sin(a)*7.2, 2.1, pz + Math.cos(a)*7.2);
    camera.lookAt(px, 0.75, pz);
    renderer.render(scene, camera);
    return;
  }
  if (paused){                      // race clock, cars, and physics all hold still
    bannerEl.style.display = 'block';
    bannerEl.textContent = 'إيقاف مؤقت';
    renderer.render(scene, camera);
    return;
  }

  // steering (joystick x + keyboard blended)
  const kt = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
  keySteer += (kt - keySteer) * Math.min(1, 6*dt);
  const steer = clamp(stickX + keySteer, -1, 1);

  // race clock: countdown locks inputs, then GO
  raceT += dt;
  if (raceT < 1){
    bannerEl.style.display = 'block';
    const cnt = raceT < 0 ? Math.ceil(-raceT) : 0;
    bannerEl.textContent = cnt > 0 ? cnt : 'انطلق!';
    if (cnt !== lastCnt){ lastCnt = cnt; beep(cnt > 0 ? 440 : 880, cnt > 0 ? 0.12 : 0.4, 'square', 0.15); }
  } else bannerEl.style.display = 'none';
  const drv = (input.drive || stickY > 0.2) && raceT >= 0 && !finished;
  const brk = (input.brake || stickY < -0.25) && raceT >= 0 && !finished;

  // longitudinal — ponytail: arcadey point-mass, no tire model
  if (brk){
    speed = speed > 0.3 ? Math.max(0, speed - 24*dt) : Math.max(-9, speed - 7*dt);
  }
  const maxNow = boostT > 0 ? BOOST_MAX : MAX;
  if (drv) speed = Math.min(maxNow, speed + (speed < 0 ? 18 : 11*(1 - speed/(maxNow+2)))*dt);
  if (!drv && !brk){
    const dec = (1.5 + Math.abs(speed)*0.35)*dt;
    speed = Math.abs(speed) <= dec ? 0 : speed - Math.sign(speed)*dec;
  }
  if (boostT > 0) speed = Math.min(BOOST_MAX, speed + 20*dt);    // the ring shoves you, throttle or not
  else if (speed > MAX) speed = Math.max(MAX, speed - 6*dt);     // boost bleeds off smoothly
  if (finished) speed = Math.max(0, speed - 12*dt);   // coast to a stop past the line

  // steer>0 = right turn; facing +z the car's right is -x (right-hand traffic layout), so heading decreases
  const sa = 0.55*steer / (1 + Math.abs(speed)*0.05);
  heading -= (speed/2.6) * Math.tan(sa) * dt;
  px += Math.sin(heading)*speed*dt;
  pz += Math.cos(heading)*speed*dt;
  px = clamp(px, -7.5, 7.5);            // ponytail: invisible walls at sidewalk edge
  player.position.set(px, 0, pz);
  player.rotation.y = heading;

  // boost rings + exhaust flames
  for (const bp of boosters){
    if (bp.taken) continue;
    bp.g.rotation.y += 2.2*dt;                                  // slow showcase spin
    bp.g.position.y = 0.55 + Math.sin(now/400 + bp.ph)*0.08;    // gentle hover bob
    if (raceT >= 0 && !finished && Math.abs(px - bp.x) < 1.5 && Math.abs(pz - bp.z) < 3){
      bp.taken = true;
      bp.g.visible = false;
      boostCount = Math.min(3, boostCount + 1);   // stock it — fire when YOU choose
      beep(660, 0.09, 'sine', 0.2); beep(990, 0.14, 'sine', 0.2, 0.09);
    }
  }
  boostT = Math.max(0, boostT - dt);
  flames.visible = boostT > 0 && speed > 1;
  if (flames.visible) flames.scale.set(0.9 + Math.random()*0.3, 0.9 + Math.random()*0.3, 0.75 + Math.random()*0.6);

  // engine revs with speed: playback rate = RPM, filter opens under load, snarls on boost
  if (AC && !muted && engineSrc){
    const rev = Math.abs(speed)/MAX;
    engineSrc.playbackRate.setTargetAtTime(0.6 + rev*1.9 + (boostT > 0 ? 0.35 : 0), AC.currentTime, 0.08);
    engineFilter.frequency.setTargetAtTime(700 + rev*5200 + (boostT > 0 ? 900 : 0), AC.currentTime, 0.1);
    const ev = finished ? 0.05 : (Math.abs(speed) > 0.5 || drv ? 0.2 + rev*0.22 : 0.11);
    engineGain.gain.setTargetAtTime(ev, AC.currentTime, 0.1);
  }

  // rivals: rubber-band speed, time-to-contact lane picking (no traffic — just each other and you)
  if (raceT >= 0){
    const blockers = [
      ...rivals.map(r => ({x: r.x, z: r.z, vz: r.cur, ref: r})),
      {x: px, z: pz, vz: Math.cos(heading)*speed},
    ];
    for (const r of rivals){
      // seconds until r reaches the nearest blocker in a lane; back=true also rejects cars alongside
      const ttc = (lane, back) => {
        let best = Infinity;
        for (const b of blockers){
          if (b.ref === r || Math.abs(b.x - lane) >= 1.8) continue;
          const dz = b.z - r.z;
          if (dz <= (back ? -6 : 0)) continue;
          if (dz <= 0){ best = 0; break; }
          best = Math.min(best, dz / Math.max(1, r.cur - b.vz));
        }
        return best;
      };
      // commit to one lane change at a time — no zigzag
      if (Math.abs(r.x - r.targetX) < 0.3 && ttc(r.targetX) < 1.4){
        let best = r.targetX, bestT = ttc(r.targetX);
        for (const l of LANES){
          if (Math.abs(l - r.targetX) > 3.1 || l === r.targetX) continue;  // adjacent lanes only
          const t = ttc(l, true);
          if (t > bestT + 0.6){ best = l; bestT = t; }
        }
        r.targetX = best;
      }
      let target = r.base;
      const gap = pz - r.z;
      if (gap > 60) target = Math.min(MAX + 2, r.base*1.25);   // rubber band: never far behind, beatable ahead
      else if (gap < -80) target = r.base*0.75;
      const want = ttc(r.x) < 0.9 ? 0 : target;
      const prev = r.cur;
      r.cur += (want - r.cur) * Math.min(1, 5*dt);
      r.cur = Math.min(r.cur, prev + 10*dt);            // car-like launch, not 0-70 in 1s
      r.z += r.cur * dt;
      const dx = clamp(r.targetX - r.x, -5*dt, 5*dt);
      r.x += dx;
      r.mesh.position.set(r.x, 0, r.z);
      r.mesh.rotation.y = clamp(Math.atan2(dx/dt, Math.max(r.cur, 4)), -0.25, 0.25);   // gentle lane-change tilt only
    }
  }

  // player vs rivals — push-out every frame, speed penalty once per contact
  for (const r of rivals){
    const dx = px - r.x, dz = pz - r.z;
    if (Math.abs(dx) < 1.8 && Math.abs(dz) < 4.0){
      if (Math.abs(dz) > Math.abs(dx)*2) pz = r.z + Math.sign(dz)*4.0;
      else px = clamp(r.x + Math.sign(dx || 1)*1.9, -7.5, 7.5);
      if (!r.hit){ speed *= 0.5; r.cur *= 0.5; r.hit = true; beep(85, 0.2, 'triangle', 0.4); }
    } else r.hit = false;
  }

  // finish: first across the line wins (same-frame ties favor you)
  if (!finished){
    if (pz >= RACE_LEN){
      finished = true;
      if (FREE){
        resultText.textContent = `\u{1F3C6} فزت!  ${fmtTime(raceT)}`;
        resultBtn.textContent = 'سباق جديد';
      } else if (LEVEL < THEMES.length){
        advance = true;
        resultText.textContent = `\u{1F3C6} أكملت التحدي ${LEVEL}!  ${fmtTime(raceT)}`;
        resultBtn.textContent = `التالي: ${THEMES[LEVEL].name} ◀`;
      } else {
        advance = true;
        resultText.textContent = `\u{1F451} أكملت جميع التحديات!  ${fmtTime(raceT)}`;
        resultBtn.textContent = 'العب من جديد';
      }
      resultEl.style.display = 'flex';
      confetti();
      winJingle();
    } else {
      const rw = rivals.find(r => r.z >= RACE_LEN);
      if (rw){
        finished = true;
        resultText.textContent = `\u{1F3C1} فازت السيارة ${AR_COLOR[rw.tint] || rw.name} — حاول مجددًا!`;
        resultBtn.textContent = 'إعادة السباق';
        resultEl.style.display = 'flex';
        loseJingle();
      }
    }
  }

  // endless street: snap uniform strips + reposition city tiles around player
  const snap = Math.round(pz/TILE)*TILE;
  grass.position.z = road.position.z = snap;
  sidewalks.forEach(s => s.position.z = snap);
  tiles.forEach((t, i) => t.position.z = snap + (i - 1)*TILE);

  // sun follows player so shadows stay near
  sun.position.set(px + 35, 70, pz + 25);
  sun.target.position.set(px, 0, pz);

  // camera
  const fx = Math.sin(heading), fz = Math.cos(heading);
  const target = camMode === 'rear'
    ? new THREE.Vector3(px - fx*9.0, 3.4, pz - fz*9.0)
    : new THREE.Vector3(px + fx*9.5, 1.5, pz + fz*9.5);   // low front cam keeps the sprite grounded
  target.x = clamp(target.x, -9, 9);    // keep the boom out of the building row during U-turns
  camera.position.lerp(target, 1 - Math.exp(-8*dt));
  if (camMode === 'rear') camera.lookAt(px + fx*3, 1.2, pz + fz*3);
  else camera.lookAt(px, 0.85, pz);

  // HUD
  const kmh = Math.round(Math.abs(speed)*3.6);
  mphEl.textContent = `${kmh} كم/س`;
  const lit = Math.round(Math.abs(speed)/MAX*10);
  bars.forEach((b, i) => b.classList.toggle('on', i < lit));
  barsEl.classList.toggle('boost', boostT > 0);
  boostCountEl.textContent = boostCount;
  boostBtn.classList.toggle('ready', boostCount > 0);
  if (!finished){
    posEl.textContent = `${1 + rivals.filter(r => r.z > pz).length}/4`;
    distEl.textContent = `${Math.max(0, Math.round(RACE_LEN - pz))} م`;
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(frame);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
